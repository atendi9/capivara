name: Run Capivara Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: 

jobs:
  test:
    name: Test on Go 1.26.1 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go 1.26.1
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true 

      - name: Install Capivara (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -fsSL https://raw.githubusercontent.com/atendi9/capivara/main/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Capivara (Windows)
        if: runner.os == 'Windows'
        run: |
          Invoke-RestMethod -Uri https://raw.githubusercontent.com/atendi9/capivara/main/install.ps1 | Invoke-Expression
          echo "$env:USERPROFILE\.local\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Run tests with Capivara
        run: capivara ./...